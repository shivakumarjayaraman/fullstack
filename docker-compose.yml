version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: training_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: training_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: training_backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://db:3306/training_db?useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: change-this-in-production
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: training_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
